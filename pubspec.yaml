name: kago_africa
description: Kago Africa Driver App - Offline-first fleet management for East African logistics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Local database
  sqflite: ^2.3.0
  path: ^1.9.0

  # Connectivity monitoring
  connectivity_plus: ^5.0.2

  # Background sync
  workmanager: ^0.5.2

  # HTTP client
  dio: ^5.4.0

  # Shared preferences
  shared_preferences: ^2.2.2

  # UUID generation
  uuid: ^4.3.3

  # Intl/date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
